steps:
  # 0. Copy food_items.json into the backend's Docker build context
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p web/backend/data && cp app/src/main/assets/food_items.json web/backend/data/food_items.json'

  # 1. Build the Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-backend'
      - '.'
    dir: 'web/backend'

  # 2. Push the Backend Docker Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-backend'

  # 3. Deploy the Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutriscan-backend'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-backend'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,FIREBASE_PROJECT_ID=$PROJECT_ID,INFERENCE_SERVICE_URL=${_INFERENCE_SERVICE_URL},FRONTEND_URL=${_FRONTEND_URL}'

  # 4. Build the Inference Service Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-inference'
      - '.'
    dir: 'web/inference-service'

  # 5. Push the Inference Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-inference'

  # 6. Deploy the Inference Service to Cloud Run (internal only)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutriscan-inference'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-inference'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 7. Install Frontend Dependencies
  #    Using 'npm install' to generate a fresh lock file since @tensorflow packages were removed.
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
    dir: 'web/frontend'

  # 8. Build Frontend React SPA (inject backend API URL at build time)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'web/frontend'
    env:
      - 'VITE_API_URL=${_VITE_API_URL}'

  # 9. Deploy Frontend to Firebase Hosting
  #    Uses the official Firebase CLI image — no custom builder needed.
  #    Requires Cloud Build service account to have "Firebase Admin" + "API Keys Viewer" roles.
  - name: 'us-docker.pkg.dev/firebase-cli/us/firebase'
    args: ['deploy', '--only', 'hosting', '--project', '$PROJECT_ID']
    dir: 'web/frontend'

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-backend'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutriscan-inference'

# Required when using a user-managed service account (not the legacy Cloud Build SA).
# CLOUD_LOGGING_ONLY sends build logs to Cloud Logging without needing a storage bucket.
options:
  logging: CLOUD_LOGGING_ONLY
# Substitution variables — set these in the Cloud Build Trigger configuration
# or override via --substitutions flag when running manually.
substitutions:
  _VITE_API_URL: 'http://localhost:3001'           # Override with your Cloud Run backend URL
  _INFERENCE_SERVICE_URL: 'http://localhost:8080'   # Override with your Cloud Run inference URL
  _FRONTEND_URL: 'http://localhost:5173'            # Override with your Firebase Hosting URL
