steps:
  # 1. Build the Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nutriscan-backend', '.']
    dir: 'web/backend'

  # 2. Push the Docker Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutriscan-backend']

  # 3. Deploy the Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutriscan-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriscan-backend'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 4. Build the Inference Service Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nutriscan-inference', '.']
    dir: 'web/inference-service'

  # 5. Push the Inference Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutriscan-inference']

  # 6. Deploy the Inference Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutriscan-inference'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriscan-inference'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated' # Internal microservice only

  # 7. Install Frontend Dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    dir: 'web/frontend'

  # 8. Build Frontend React SPA
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'web/frontend'

  # 9. Deploy Frontend to Firebase Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting', '--project', '$PROJECT_ID']
    dir: 'web/frontend'

images:
  - 'gcr.io/$PROJECT_ID/nutriscan-backend'
